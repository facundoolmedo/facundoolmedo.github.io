services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - ./:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_ENV: development
    command: bundle exec jekyll serve --host 0.0.0.0 --port 4000 --livereload --force_polling

volumes:
  bundle_cache:
