---
layout: default
---
<section class="section-shell py-5">
  <div class="container">
    <div class="section-head mb-4">
      {% if page.section_title %}
      <p class="eyebrow mb-1">{{ page.section_title }}</p>
      {% endif %}
      <h1 class="display-6 fw-bold mb-3"{% if page.title_i18n %} data-i18n="{{ page.title_i18n }}"{% endif %}>{{ page.title }}</h1>
      {% if page.lead %}
      <p class="lead text-secondary-emphasis mb-0"{% if page.lead_i18n %} data-i18n="{{ page.lead_i18n }}"{% endif %}>{{ page.lead }}</p>
      {% endif %}
    </div>
    <article class="content-card p-4 p-md-5">
      {{ content }}
    </article>
  </div>
</section>
